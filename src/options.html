<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AnyMenu 设置</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; width: 300px; color: #333; }
    .setting-item { display: flex; justify-content: space-between; margin-bottom: 15px; }
    label { font-weight: 500; }
    #status { color: #2ecc71; font-size: 14px; min-height: 20px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>扩展设置</h2>

  <!--不显示了，免得小白用户觉得欲盖弥彰
  <div>权限 & 安全性说明: <br>
此扩展只会将选区和网页内容发送给本地的 AnyMenu 应用程序并用于本地服务。<br>
不会收集其他任何内容，也不会将数据发送到任何远程服务器，数据只作为临时状态而不会被持久化记录。</div>
  -->

  <div class="setting-item">
    <label for="is_debug">开启 Debug 面板</label>
    <input type="checkbox" id="is_debug">
  </div>

  <div class="setting-item">
    <label for="is_bridge">开启与 AnyMenu App 通信</label>
    <input type="checkbox" id="is_bridge">
  </div>

  <div class="setting-item">
    <label for="app_port">通信端口 (需保持与App中的端口号一致)</label>
    <input type="text" id="app_port">
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
